name: verify marketing draft studio

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: pes-marketing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check
      - name: Smoke-test authenticated demo runtime
        env:
          MARKETING_OPERATOR_TOKEN: test-operator-token-123456789
          MARKETING_SESSION_SECRET: test-session-secret-123456789012345
          MARKETING_DEMO_MODE: 'true'
          PORT: '3100'
        run: |
          node server.mjs > /tmp/pes-marketing.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid"' EXIT
          for attempt in $(seq 1 20); do
            curl --fail --silent http://127.0.0.1:3100/api/status > status.json && break
            sleep 0.25
          done
          node -e "const s=require('./status.json'); if(!s.ready || s.publishing || s.sideEffects) process.exit(1)"
